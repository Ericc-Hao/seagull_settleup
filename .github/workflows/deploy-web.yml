# Manually deploy Expo Web to GitHub Pages from the `web` branch.
# 1. Push code to `web`, then run this workflow from GitHub Actions.
# 2. Build Expo Web (`npx expo export -p web`) into `dist/`.
# 3. Upload `dist/` as the GitHub Pages artifact.
# 4. Deploy the artifact to GitHub Pages (custom domain: split.seagullcoffee.ca).

name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      # Only allow manual runs from the `web` branch.
      - name: Ensure workflow runs from web branch
        run: |
          if [ "${{ github.ref_name }}" != "web" ]; then
            echo "This workflow must be run from the web branch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build static Expo Web output into dist/.
      - name: Build Expo Web
        run: npx expo export -p web

      # GitHub Pages needs .nojekyll; CNAME sets the custom domain.
      - name: Add GitHub Pages files
        run: |
          touch dist/.nojekyll
          echo "split.seagullcoffee.ca" > dist/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload dist/ for the deploy job.
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
