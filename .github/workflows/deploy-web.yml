name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Ensure workflow runs from main branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "This workflow must be run from the main branch."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23.11.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo Web
        run: npx expo export -p web

      - name: Verify Expo Web output
        run: |
          ls -la dist
          test -f dist/index.html || (echo "dist/index.html not found. Expo web export failed or output path is wrong." && exit 1)

      - name: Add GitHub Pages files
        run: |
          touch dist/.nojekyll
          echo "split.seagullcoffee.ca" > dist/CNAME

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4